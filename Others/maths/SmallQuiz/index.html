<!DOCTYPE html>
<html>
<body>
<p id="d"></p>

<input type="number" id="inp" value=""></input>
<button type="button" id="done" onclick="check()">Send</button>

<div id="Setting">
<p id="settingP"><b>Setting</b></p>

<select name="difficuity" id="diff">
  <option value="1">Easy</option>
  <option value="6">Medium</option>
  <option value="18">Hard</option>
  <option value="120">Impossible</option>
</select>
<button onclick="New() " id="done">Reset</button>
</div>
</body>
<script>
function radPick(s, e) {
  return Math.floor(e * Math.random()) + s;
}
var a, b, c;
var corr;
function New() {
  let to = 40 * Number(document.getElementById("diff").value);
  a = radPick(2, to);
  b = radPick(2, to);
  c = radPick(2, to);
  
  corr = a + b - c;
  document.getElementById("d").innerHTML = a + "+" + b + "-" + c + "=";
}
function check() {
  let ans = document.getElementById("inp");
  if (ans.value != corr) alert("wrong, it should be " + corr);
  else alert("CORRECT");
  ans.value = "";
  New();
}


var d = document.getElementById('Setting');
d.style.position = "absolute";
d.style.left = 10 +'px';
d.style.top = 400 +'px';
New();
</script>
<style>
html {
  background-color: #111111;
}
p {
  font-family: Arial;
  color: white;
}
#inp {
  color: white;
  background-color: #222222;
  border-radius: 8px;
}
#done {
  background-color: #4CAF50; /* Green */
  border: none;
  color: white;
  padding: 3px 6px;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  border-radius: 5px;
}
</style>
</html>
